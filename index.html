<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width_device-width, initial-scale=1.0">
        <title>KALKULATOR</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <div class="container">
            <div class="calculator">
                <form>
                    <center><h2 style="color: #33ffd8; font-family: Arial, Helvetica, sans-serif;">Kalkulator</h2></center>
                    <div class="display">
                        <input type="text" name="display">
                    </div>
                    <div>
                        <input type="button" value="AC" onclick="display.value = '' " class="operator">
                        <input type="button" value="DE" onclick="display.value = display.value.toString().slice(0,-1)" class="operator">
                        <input type="button" value="." onclick="display.value += '.' " class="operator">
                        <input type="button" value="/" onclick="display.value += '/' " class="operator">
                    </div>
                    <div>
                        <input type="button" value="7" onclick="display.value += '7' ">
                        <input type="button" value="8" onclick="display.value += '8' ">
                        <input type="button" value="9" onclick="display.value += '9' ">
                        <input type="button" value="*" onclick="display.value += '*' " class="operator">
                    </div>
                    <div>
                        <input type="button" value="4" onclick="display.value += '4' ">
                        <input type="button" value="5" onclick="display.value += '5' ">
                        <input type="button" value="6" onclick="display.value += '6' ">
                        <input type="button" value="-" onclick="display.value += '-' " class="operator">
                    </div>
                    <div>
                        <input type="button" value="1" onclick="display.value += '1' ">
                        <input type="button" value="2" onclick="display.value += '2' ">
                        <input type="button" value="3" onclick="display.value += '3' ">
                        <input type="button" value="+" onclick="display.value += '+' " class="operator">
                    </div>
                    <div>
                        <input type="button" value="00" onclick="display.value += '00' ">
                        <input type="button" value="0" onclick="display.value += '0' ">
                        <input type="button" value="=" onclick="hitung()" class="equal operator">                    </div>
                    <br>
                    <center><small>Copyright &copy; Nauval Yasha Fadillah - Kalkulator</small></center>
                </form>
            </div>
        </div>
        <script>

function hitung(){
    let display = document.forms[0].display;
    let value = display.value;

    // jika kosong
    if(value.trim() === ""){
        alert("⚠️ Error: Tidak ada perhitungan yang dimasukkan!");
        return;
    }

    try{

        let hasil = eval(value);

        // cek pembagian nol
        if(!isFinite(hasil)){
            alert("❌ Error: baleg! nya teu bisa atuh dibagi nol mah!");
            display.value = "";
            return;
        }

        display.value = hasil;

    }catch(error){

        alert("❌ Error: Sing Baleg atuh!");
        display.value = "";

    }
}

</script>
    </body>
</html>
